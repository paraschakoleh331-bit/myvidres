<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <title>App</title>
    <style>
        /* Обнуляємо всі системні рамки */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
            position: fixed; /* Запобігає випадковому скролу */
        }

        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            
            /* ФОРМУЛА ЗІ СКРИНШОТА: динамічна висота + відступ знизу */
            /* 100dvh — реальна висота вікна, env — висота чорної смуги */
            height: calc(100dvh + env(safe-area-inset-bottom));
            
            /* cover — щоб відео заповнило весь простір без дірок */
            object-fit: cover; 
            
            /* Щоб кліки проходили крізь відео на body */
            pointer-events: none; 
            -webkit-user-select: none;
        }
    </style>
</head>
<body>
    <video id="v" autoplay loop muted playsinline webkit-playsinline>
        <source src="https://cdn.discordapp.com/attachments/1434263985108156579/1489566233094520923/IMG_2728.MP4?ex=69d0e228&is=69cf90a8&hm=3f662f16cbb0cbdba719a528f58c59a5756539926092523dc7233d68d4f52fc4&" type="video/mp4">
    </video>

    <script>
        // iOS блокує автоплей, якщо телефон у режимі енергозбереження.
        // Цей скрипт запустить відео при першому ж торканні екрана.
        document.body.onclick = () => {
            const video = document.getElementById('v');
            video.play();
        };
    </script>
</body>
</html>
