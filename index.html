<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <title>FullVideo</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: black;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Ховаємо стандартні кнопки керування iOS, якщо вони з'являться */
        video::-webkit-media-controls {
            display: none !important;
        }
    </style>
</head>
<body>
    <video id="v" loop muted playsinline webkit-playsinline>
        <source src="https://cdn.discordapp.com/attachments/1434263985108156579/1489566233094520923/IMG_2728.MP4?ex=69d0e228&is=69cf90a8&hm=3f662f16cbb0cbdba719a528f58c59a5756539926092523dc7233d68d4f52fc4&" type="video/mp4">
    </video>

    <script>
        const video = document.getElementById('v');

        document.body.onclick = () => {
            video.play();
            
            // Спроба активувати нативний повноекранний режим iOS
            if (video.webkitEnterFullscreen) {
                video.webkitEnterFullscreen();
            } else if (video.requestFullscreen) {
                video.requestFullscreen();
            }
        };

        // Якщо користувач виходить з фулскріну кнопкою "Done", 
        // відео продовжує грати у вікні
        video.addEventListener('webkitendfullscreen', () => {
            video.play();
        });
    </script>
</body>
</html>
