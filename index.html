<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    
    <title>App</title>
    <style>
        /* Обнуляємо відступи та фіксуємо екран */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
            position: fixed;
        }

        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            
            /* ФОРМУЛА: Динамічна висота + відступ нижньої полоски */
            /* 100dvh автоматично підлаштовується під прихований тулбар */
            height: calc(100dvh + env(safe-area-inset-bottom));
            
            /* cover заповнює екран без спотворення пропорцій */
            object-fit: cover; 
            
            /* Вимикаємо взаємодію, щоб кліки йшли на body */
            pointer-events: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>
    <video id="v" autoplay loop muted playsinline webkit-playsinline>
        <source src="https://cdn.discordapp.com/attachments/1434263985108156579/1489566233094520923/IMG_2728.MP4?ex=69d0e228&is=69cf90a8&hm=3f662f16cbb0cbdba719a528f58c59a5756539926092523dc7233d68d4f52fc4&" type="video/mp4">
    </video>

    <script>
        // Запуск відео при дотику (необхідно для iOS)
        document.body.onclick = () => {
            document.getElementById('v').play();
        };
    </script>
</body>
</html>
