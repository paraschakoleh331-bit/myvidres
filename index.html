<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <title>VideoApp</title>
    <style>
        /* Прибираємо всі відступи та фіксуємо фон */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: black;
            overflow: hidden;
            display: flex; /* Центрування через Flexbox */
            align-items: center;
            justify-content: center;
        }
        video {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); /* Математично точний центр */
            min-width: 100%; 
            min-height: 100%;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <video id="v" autoplay loop muted playsinline>
        <source src="https://cdn.discordapp.com/attachments/1434263985108156579/1489566233094520923/IMG_2728.MP4?ex=69d0e228&is=69cf90a8&hm=3f662f16cbb0cbdba719a528f58c59a5756539926092523dc7233d68d4f52fc4&" type="video/mp4">
    </video>
    <script>
        // Запуск відео при дотику
        document.body.onclick = () => {
            const video = document.getElementById('v');
            video.play();
        };
    </script>
</body>
</html>
